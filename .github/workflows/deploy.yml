name: Frontend CI/CD — Test, Build & Deploy

# Runs on every push to main and on every pull request targeting main.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: frontend-cicd-${{ github.ref }}
  cancel-in-progress: true

env:
  AWS_REGION: ap-southeast-1
  S3_BUCKET: skillsprint-fe-prod
  CLOUDFRONT_DISTRIBUTION_ID: EYCOBM8GYKNFD
  DEPLOY_ROLE_ARN: arn:aws:iam::781863099930:role/GitHubActionsSkillSprintFrontendDeployRole
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ci-cd:
    name: Test → Build → Deploy
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1b) Node.js v24 runtime
      - name: Setup Node.js v24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # 2) Clean, reproducible install from the lockfile
      - name: Install dependencies
        run: npm ci

      # 🛡️ TẦNG PHÒNG THỦ 1 — Đã sửa lệnh để gọi script từ package.json
      - name: Type check TypeScript
        run: npm run type-check

      # 🛡️ TẦNG PHÒNG THỦ 2 — Break-Build Guard.
      - name: Run frontend test suite
        run: npm run test:ci

      # 4) Compile production-ready assets
      - name: Build production bundle
        run: npm run build

      # 5) Authenticate to AWS via OIDC — push-to-main only
      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # 5b) Sync the dist/ bundle into the S3 origin bucket
      - name: Deploy dist/ to S3
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: aws s3 sync dist/ "s3://${{ env.S3_BUCKET }}" --delete

      # 6) Invalidate the CloudFront edge cache so users get the new client immediately
      - name: Invalidate CloudFront cache
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ env.CLOUDFRONT_DISTRIBUTION_ID }}" \
            --paths "/*"